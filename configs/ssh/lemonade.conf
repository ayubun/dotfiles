# Managed by dotfiles -> configs/ssh/lemonade.conf
# Included from ~/.ssh/config by configs/ssh/setup.sh (Mac only).
#
# Lets markdown-preview.nvim (and `lemonade open <url>`) on a remote host open in
# THIS Mac's browser, purely over the SSH connection:
#
#   RemoteForward 2489        -> the remote's localhost:2489 reaches the Mac's
#                                lemonade server, so `lemonade open` is delivered here.
#   LocalForward  48923-48927 -> the Mac's localhost:<port> reaches the remote's
#                                markdown preview server, so opened URLs actually load.
#
# markdown-preview.nvim picks a free port from 48923-48927 per nvim instance (see
# configs/nvim/plugins/main.lua), so the whole range is forwarded to let several
# separate nvims preview at once. Coder hosts already forward 48923 via their own
# managed block; that duplicate is harmless (the first bind wins). Keep this range
# in sync with PORT_FIRST/PORT_LAST in the nvim config.
#
# github.com is excluded so routine git-over-SSH doesn't attempt the tunnels
# (which would just print harmless "remote port forwarding failed" warnings).
Host * !github.com
  RemoteForward 2489 127.0.0.1:2489
  LocalForward 48923 127.0.0.1:48923
  LocalForward 48924 127.0.0.1:48924
  LocalForward 48925 127.0.0.1:48925
  LocalForward 48926 127.0.0.1:48926
  LocalForward 48927 127.0.0.1:48927
